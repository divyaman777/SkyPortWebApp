iv class="text-[#00FF41] text-sm font-mono h-5"><span class="cursor-blink ml-1">▮</span></div></div><div class="h-1 bg-[rgba(0,255,65,0.2)] rounded overflow-hidden mt-3"><div class="h-full bg-[#00FF41] transition-all duration-300" style="width:0%;box-shadow:0 0 10px #00FF41"></div></div></div></div></div><!--$--><!--/$--><noscript><div style="padding:2rem;max-width:800px;margin:0 auto;font-family:system-ui, sans-serif;color:#e0e0e0;background-color:#0a0a0f"><h1>Skyport — Real-Time 3D Satellite Tracker</h1><p>Skyport is a free, browser-based 3D satellite tracker that shows the live position of every broadcasting satellite orbiting Earth. Built with Three.js and real orbital mechanics (SGP4 propagation from CelesTrak TLE data).</p><h2>Satellites We Track</h2><ul><li><strong>ISS (International Space Station)</strong> — NORAD 25544, LEO 408 km, live audio streams</li><li><strong>Hubble Space Telescope</strong> — NORAD 20580, LEO 547 km</li><li><strong>JWST (James Webb Space Telescope)</strong> — L2 Lagrange point, 1.5 million km from Earth</li><li><strong>Starlink Constellation</strong> — 1,584 satellites, 72 orbital planes, 550 km altitude, inter-satellite laser links</li><li><strong>Tiangong Space Station</strong> — NORAD 48274, LEO 390 km</li><li><strong>GOES-16 &amp; GOES-18</strong> — Geostationary weather satellites, live imagery</li><li><strong>NOAA-19</strong> — Polar-orbiting weather satellite, LEO 870 km</li><li><strong>Landsat 9</strong> — Earth observation, LEO 705 km</li><li><strong>AO-91 (RadFxSat)</strong> — Amateur radio CubeSat, LEO 450 km</li><li><strong>Artemis II (Orion MPCV)</strong> — Cislunar trajectory, JPL Horizons data</li></ul><h2>Features</h2><ul><li>Real-time satellite positions using SGP4 orbital propagation</li><li>10 hand-modelled 3D spacecraft built from Three.js primitives</li><li>Live Artemis II mission tracking with NASA JPL Horizons data</li><li>Starlink constellation simulation with Walker Delta phasing and laser links</li><li>GOES weather satellite imagery</li><li>ISS live audio streams and Deep Space Network status</li><li>Amateur radio transponder frequencies</li></ul><h2>Frequently Asked Questions</h2><h3>What is Skyport?</h3><p>Skyport is a free, real-time 3D satellite tracker that runs entirely in your browser. It shows live positions of ISS, Hubble, JWST, Starlink, Tiangong, GOES weather satellites, and more using real TLE data from CelesTrak.</p><h3>How does Skyport track satellites?</h3><p>Skyport uses SGP4 orbital propagation with Two-Line Element (TLE) data updated hourly from CelesTrak — the same math used by NASA and NORAD.</p><h3>Is Skyport free?</h3><p>Yes. No login, no ads, no backend. Runs entirely in your browser using WebGL.</p><p>Please enable JavaScript to use the interactive 3D satellite tracker.</p><p><a href="https://skyport.space" style="color:#00D4FF">Visit Skyport</a></p></div></noscript><script src="/_next/static/chunks/0ra0c46.9a3nc.js" id="_R_" async=""></script><script>(self.__next_f=self.__next_f||[]).push([0])</script><script>self.__next_f.push([1,"1:\"$Sreact.fragment\"\n9:I[68027,[\"/_next/static/chunks/0ecau2j~avd.1.js\",\"/_next/static/chunks/0d3shmwh5_nmn.js\"],\"default\",1]\n:HL[\"/_next/static/chunks/08yyef-aux4z0.css\",\"style\"]\n:HL[\"/_next/static/chunks/0xhp-ljhdt_aa.css\",\"style\"]\n:HL[\"/_next/static/media/0c8c4ded07fff55c-s.p.0wf336i9wr3zj.woff2\",\"font\",{\"crossOrigin\":\"\",\"type\":\"font/woff2\"}]\n:HL[\"/_next/static/media/70bc3e132a0a741e-s.p.1409xf.ylxg8g.woff2\",\"font\",{\"crossOrigin\":\"\",\"type\":\"font/woff2\"}]\n:HL[\"/_next/static/media/c9bd7381a27f2960-s.p.0nt9ayxdmqydo.woff2\",\"font\",{\"crossOrigin\":\"\",\"type\":\"font/woff2\"}]\n2:T484,{\"@context\":\"https://schema.org\",\"@type\":\"WebApplication\",\"name\":\"Skyport\",\"url\":\"https://skyport.space\",\"description\":\"Skyport is a free real-time 3D satellite tracker. Watch ISS, Hubble, JWST, Starlink, and Artemis II orbit Earth live in your browser — with weather i
